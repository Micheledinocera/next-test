# GitHub Actions per il deploy di un sito Next.js su GitHub Pages
name: Deploy Next.js site to Pages

on:
  push:
    tags:
      - 'v*.*.*' # Si attiva solo sui tag di versione
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract tag and metadata
        id: meta
        run: |
          corepack enable
          TAG_REF="${{ github.ref }}"
          TAG="${TAG_REF#refs/tags/}"
          COMMIT_SHA="${{ github.sha }}"
          TIMESTAMP="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "sha=${COMMIT_SHA}" >> $GITHUB_OUTPUT
          echo "ts=${TIMESTAMP}" >> $GITHUB_OUTPUT

      - name: Create version.json in workspace
        run: |
          mkdir -p public
          cat > public/version.json <<EOF
          {
            "version": "${{ steps.meta.outputs.tag }}",
            "commit": "${{ steps.meta.outputs.sha }}",
            "built_at": "${{ steps.meta.outputs.ts }}"
          }
          EOF

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "23"
          cache: 'npm' # Ottimizza i build successivi

      - name: Install dependencies
        run: npm install

      - name: Static HTML export with Next.js
        run: npm run build
        # Nota: Assicurati che nel tuo next.config.ts ci sia output: 'export'

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # In Next.js l'output statico va nella cartella /out
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4